# build-target.yml — reusable workflow that builds ONE (recipe, target) pair
# on the runner the target declares, then uploads the artifacts.
#
# It is the CI equivalent of `shared/run-build.sh`: same six-stage pipeline
# (validate -> fetch -> build -> test -> package-tarball -> package-deb),
# just driven by Actions instead of a developer shell. The caller
# (release.yml) discovers targets and fans this out across a matrix, passing
# each target's runner labels so every package is built on the correct host
# platform (e.g. ORT CUDA on a hosted native-aarch64 runner + JetPack container,
# tflite on a standard hosted Ubuntu runner).
#
# The runner is chosen by the caller from the target's `runs_on:` field, so
# adding a target needs no change here — target.yaml stays authoritative.

name: Build target

on:
  workflow_call:
    inputs:
      package:
        description: Published package name (packages/<package>/)
        type: string
        required: true
      recipe:
        description: Path to the recipe yaml
        type: string
        required: true
      target_dir:
        description: Path to the target directory (contains target.yaml + build.sh)
        type: string
        required: true
      target_key:
        description: Published target key (used in artifact + work/ paths)
        type: string
        required: true
      runs_on:
        description: JSON-encoded array of runner labels (from target.yaml runs_on)
        type: string
        required: true
      build_number:
        description: EdgeFirst build number
        type: string
        required: true
      container:
        description: >
          If non-empty, run the build inside this Docker image (e.g. an NVIDIA
          JetPack image), so a GPU-less hosted runner can produce accelerated
          aarch64 builds. Empty = build directly on the runner.
        type: string
        required: false
        default: ''

jobs:
  build:
    name: ${{ inputs.package }} / ${{ inputs.target_key }}
    # Labels come straight from the target's runs_on — a hosted label
    # (["ubuntu-22.04"]) or a self-hosted set (["self-hosted","jetson-orin","jp62"]).
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      # Host setup is only needed when the build runs directly on the runner.
      # Container builds (inputs.container set) install their own toolchain
      # inside the image, so these host steps are skipped for them.
      - name: Ensure mikefarah yq
        if: ${{ inputs.container == '' }}
        shell: bash
        run: |
          if ! command -v yq >/dev/null 2>&1 || ! yq --version 2>&1 | grep -qi mikefarah; then
            arch="$(dpkg --print-architecture 2>/dev/null || echo amd64)"
            sudo wget -qO /usr/local/bin/yq \
              "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${arch}"
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Install build toolchain (GitHub-hosted runners only)
        # Self-hosted build hosts are provisioned once with their exact toolchain
        # — see TESTING.md "Build host requirements" — so we do NOT apt-install on
        # them. GitHub-hosted runners are ephemeral, so the CPU-only targets
        # (tflite) install their CMake/Ninja toolchain here.
        if: ${{ runner.environment == 'github-hosted' && inputs.container == '' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build dpkg-dev

      - name: Ensure Docker (container builds on hosted Arm runners)
        # GitHub's Arm64 hosted runners do NOT ship Docker, unlike the x86_64
        # images — so a container build finds no `docker` and fails with exit
        # 127. Install it from the Ubuntu repo when missing and start the
        # daemon. Self-hosted build hosts are provisioned with their own
        # Docker, so this only runs on hosted runners.
        if: ${{ runner.environment == 'github-hosted' && inputs.container != '' }}
        shell: bash
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends docker.io
            sudo systemctl enable --now docker
          fi
          sudo docker --version

      - name: Build
        # Pass dispatch-controlled inputs via env (never interpolate ${{ }}
        # directly into the shell) so a crafted input can't inject commands.
        env:
          RECIPE: ${{ inputs.recipe }}
          TARGET_DIR: ${{ inputs.target_dir }}
          BN: ${{ inputs.build_number }}
          CONTAINER: ${{ inputs.container }}
        shell: bash
        run: |
          chmod +x shared/*.sh shared/tests/*.sh "$TARGET_DIR/build.sh" 2>/dev/null || true
          if [ -z "$CONTAINER" ]; then
            shared/run-build.sh "$RECIPE" "$TARGET_DIR" "$BN"
            exit 0
          fi
          # Build inside the target's container (e.g. NVIDIA JetPack) so a
          # GPU-less native-aarch64 runner can produce the accelerated build —
          # nvcc compiles device code (sm_87) without a GPU, and the image
          # supplies the exact CUDA/cuDNN userspace. RECIPE/TARGET_DIR/BN are
          # forwarded with explicit -e VAR="$VAR" values: sudo resets the
          # environment (env_reset), so the bare `-e VAR` name-passing form
          # would forward nothing and trip `set -u` inside the image. The
          # values expand in this step's shell (double-quoted = one arg each,
          # injection-safe) and are re-quoted as run-build.sh args in-container.
          # Use sudo: on a freshly apt-installed docker.io (hosted Arm runner)
          # the runner user is not yet in the `docker` group, and passwordless
          # sudo is available on all hosted runners. Outputs under work/ land
          # root-owned, which the later read-only upload steps handle fine.
          echo "Building inside container: $CONTAINER"
          sudo docker run --rm \
            -v "$PWD":/ws -w /ws \
            -e RECIPE="$RECIPE" -e TARGET_DIR="$TARGET_DIR" -e BN="$BN" \
            "$CONTAINER" \
            bash -euo pipefail -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                build-essential dpkg-dev binutils file patch xz-utils \
                python3 python3-pip python3-venv wget curl ca-certificates git >/dev/null
              # ONNX Runtime needs cmake >= 3.28; the JetPack image base
              # (Ubuntu 22.04) ships 3.22 via apt, so install a newer cmake +
              # ninja from pip (puts them on PATH at /usr/local/bin).
              python3 -m pip install --quiet "cmake>=3.28,<4" ninja
              if ! command -v yq >/dev/null 2>&1; then
                wget -qO /usr/local/bin/yq \
                  https://github.com/mikefarah/yq/releases/latest/download/yq_linux_arm64
                chmod +x /usr/local/bin/yq
              fi
              # The workspace is bind-mounted from the host (owned by the runner
              # uid) while git runs as root in here. ONNX Runtime build.py always
              # runs `git submodule sync`; with no .git in the extracted tarball,
              # git walks up to the packaging repo at /ws and aborts with
              # "detected dubious ownership" (exit 128). Mark all repos safe so
              # the sync no-ops, exactly as it does on the non-container CPU path.
              git config --global --add safe.directory '\''*'\''
              shared/run-build.sh "$RECIPE" "$TARGET_DIR" "$BN"
            '

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.package }}-${{ inputs.target_key }}-edgefirst${{ inputs.build_number }}
          path: |
            work/${{ inputs.target_key }}/dist/*.tar.gz
            work/${{ inputs.target_key }}/dist/*.sha256
            work/${{ inputs.target_key }}/dist/deb/*.deb
            work/${{ inputs.target_key }}/dist/deb/*.sha256
          if-no-files-found: error

      # NOTE: release assets are NOT uploaded here. Build runners aren't
      # guaranteed to have the `gh` CLI — the ubuntu-24.04-arm-xlarge image
      # used for the Jetson target does not — so a per-job `gh release upload`
      # fails with exit 127 *after* a multi-hour compile. Instead the
      # publish-apt job (release.yml) downloads every build's workflow
      # artifacts and attaches them to the release in one place, on a
      # ubuntu-latest runner that has gh.
