# Recipe for TensorFlow Lite 2.19.0 (C API + C++ shared libraries)
#
# Declares HOW to fetch and prepare the TensorFlow source for a build of
# both TFLite shared libraries — the C API (libtensorflowlite_c.so) and the
# full C++ runtime (libtensorflow-lite.so.2.19.0). Target-agnostic — the
# same recipe is consumed by every target (linux-x86_64, linux-aarch64).
# Per-target parallelism and packaging live in targets/<key>/target.yaml.
#
# Build system: CMake (NOT bazel — only the full TensorFlow build uses bazel,
# which we don't invoke). Upstream ships a self-contained CMakeLists at
# tensorflow/lite/c/ for the C API; the full C++ library is built from
# tensorflow/lite/ with the shared-lib patch below. The C API config still
# reproduces the EdgeFirstAI/tflite-rs (tflite-v2.19.0) artifacts, except
# XNNPACK is now ON (see below). The two libraries are independent: the C
# API statically links its own copy of the C++ core, so neither needs the
# other at runtime.

upstream:
  repo: tensorflow/tensorflow
  tag: v2.19.0
  source_url: https://github.com/tensorflow/tensorflow/archive/refs/tags/v2.19.0.tar.gz
  # Pin on first fetch: leave as PIN_ON_FIRST_FETCH; fetch-source.sh writes
  # back the computed SHA so subsequent fetches cross-check. Commit it after.
  source_sha256: 4691b18e8c914cdf6759b80f1b3b7f3e17be41099607ed0143134f38836d058e
  # tflite's C API CMake project pulls its dependencies (abseil, flatbuffers,
  # the XNNPACK tree, etc.) via CMake FetchContent at configure time, not git
  # submodules. The tarball release form is therefore sufficient.
  submodules: false

# Display name used in BUILD_INFO.txt and Debian package descriptions where
# the URL-tail "tensorflow" wouldn't be specific enough.
upstream_name: TensorFlow Lite

# Patches applied to the extracted upstream source (patch -p1 from the source
# root, via shared/fetch-source.sh). Listed as repo-rooted paths. See
# packages/onnxruntime/recipes/1.22.1.yaml for the convention.
patches:
  # Upstream tensorflow/lite/CMakeLists.txt at v2.19.0 only builds the full C++
  # library as a static .a with no shared-lib option. This adds
  # TFLITE_BUILD_SHARED_LIB (symbol-filtered, versioned SONAME) so we can ship
  # libtensorflow-lite.so.2.19.0. The C API project (tensorflow/lite/c) already
  # builds shared and is unaffected. No-op unless -DTFLITE_BUILD_SHARED_LIB=ON.
  - packages/tflite/patches/2.19.0/0001-cmake-shared-cpp-lib.patch

# Default CMake configuration shared by both library builds. The per-target
# build.sh adds the project-specific shared-lib flag for each CMake project
# (TFLITE_C_BUILD_SHARED_LIBS for the C API, TFLITE_BUILD_SHARED_LIB for C++).
build_defaults:
  config: Release
  cmake_extra_defines:
    # Build the C API as a shared library (libtensorflowlite_c.so). (Harmless/
    # unused for the C++ project, which keys off TFLITE_BUILD_SHARED_LIB.)
    TFLITE_C_BUILD_SHARED_LIBS: "ON"
    # XNNPACK ON: the profiler consumer's default CPU path is the XNNPACK
    # delegate (Delegate::xnnpack()), which needs the delegate compiled into the
    # library. This intentionally diverges from the historical tflite-rs
    # artifacts (which were XNNPACK OFF); XNNPACK is also upstream's C++ default.
    TFLITE_ENABLE_XNNPACK: "ON"
    # KleidiAI OFF: on arm64 XNNPACK otherwise FetchContent-downloads ARM's
    # KleidiAI from gitlab.arm.com, whose auto-generated archive is not
    # byte-reproducible — the SHA256 no longer matches the one TF 2.19.0 pinned,
    # so the download fails deterministically (hash mismatch). XNNPACK works
    # fine without it (it just drops the newest SME/i8mm microkernels), and
    # dropping the unreproducible external fetch keeps the build reproducible.
    # Harmless on x86_64, where XNNPACK forces this OFF anyway (aarch64-only).
    XNNPACK_ENABLE_KLEIDIAI: "OFF"

# Build layout — tells package-tarball.sh and package-deb.sh what to collect
# from the built source tree. Paths are relative to the extracted source dir.
build_layout:
  # CMake with a single-config generator (Make/Ninja) on Linux writes the
  # shared library directly into the build dir — no ${config} subdirectory,
  # unlike ORT's build/<OS>/${config}/. The target build.sh configures into
  # this exact directory.
  output_dir: _build

  # Both libraries are staged into output_dir by build.sh, so one glob over the
  # main entry collects both with their symlink chains (package-tarball.sh copies
  # the main glob with `cp -P`, preserving symlinks):
  #   - libtensorflowlite_c.so          (C API, flat unversioned)
  #   - libtensorflow-lite.so.2.19.0    (C++, versioned) + libtensorflow-lite.so
  # version_soname is intentionally NOT set: the C++ SONAME is versioned at build
  # time by the CMake patch (SOVERSION), and the C API stays flat.
  libraries:
    main: "libtensorflow*.so*"
    extras: []

  # Public C headers. Since TF 2.14 the canonical headers live under
  # tensorflow/lite/core/c/; the tensorflow/lite/c/ copies are thin shims.
  # We ship the canonical (core/c) content but at the historical
  # tensorflow/lite/c/ include path that consumers #include — the src/dest
  # form preserves that nested layout in the tarball's include/ and in the
  # -dev package's usr/include/. (Matches the tflite-rs release exactly.)
  headers:
    - src: tensorflow/lite/core/c/c_api.h
      dest: tensorflow/lite/c/c_api.h
    - src: tensorflow/lite/core/c/c_api_types.h
      dest: tensorflow/lite/c/c_api_types.h
    - src: tensorflow/lite/core/c/common.h
      dest: tensorflow/lite/c/common.h
    - src: tensorflow/lite/core/c/builtin_op_data.h
      dest: tensorflow/lite/c/builtin_op_data.h

  # Provenance files copied verbatim into the tarball root / Debian copyright.
  docs:
    - LICENSE

  # Version string for the package. TF encodes the release in the tag; strip
  # the leading 'v' (v2.19.0 -> 2.19.0).
  version_from: tag

  # License SPDX identifier for the upstream code, copied into Debian copyright.
  license: Apache-2.0

# Notes for future maintainers (not consumed by tooling):
#
# - Headers exist in BOTH tensorflow/lite/c/ and tensorflow/lite/core/c/ at
#   2.19.0. The lite/c/ versions are one-line shims that #include the core/c
#   ones; we stage the core/c content (verified byte-identical to the
#   tflite-rs release) at the lite/c/ path. If a future TF version moves or
#   removes core/c/, update the header src: paths here.
#
# - Only the C API headers ship (in the tarball include/). The C++ library is
#   shipped as a runtime .so for dlopen consumers (edgefirst-tflite's
#   discovery falls back to libtensorflow-lite.so.2.19.0); no C++ headers are
#   packaged because no consumer links the C++ API at compile time.
#
# - macOS and Windows targets are intentionally NOT provided here: those
#   platforms are well served by ONNX Runtime in EdgeFirst deployments, so
#   tflite is shipped for Linux (x86_64, aarch64) only.
